<!DOCTYPE html>
<html>
<head>
    <title>HTML JOBS 79</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>HTML JOBS 79</h1>

<div class="login-box">
    <h3>Log in with your reference code</h3>
    <input type="text" id="refCode" placeholder="Enter 4-digit code">
</div>

<div class="preference-box">
    <h3>Enter your Job preference</h3>
    <input type="text" id="jobPref" placeholder="Type anything">
    <button onclick="submitPreference()">Send</button>
</div>

<div id="popup" class="popup">
    <div class="popup-content">
        <div class="loader"></div>
        <p id="popupText"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
